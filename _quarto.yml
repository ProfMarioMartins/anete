format:
  html:
    page-layout: full
    highlight-style: github
    theme: 
      - simplex # Experimente também: flatly, litera, simplex, journal
    toc: true
    include-after-body: custom.html
    callout-appearance: simple
    smooth-scroll: true
    sidebar:
      style: "docked"
      collapse-level: 2
      pinned: true
    tools:
      - toggle
    css: custom.css

editor: visual


# Como Visualizar o Livro Localmente Antes de Publicar
